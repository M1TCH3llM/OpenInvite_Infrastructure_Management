---
- name: Deploy Spring Boot Backend
  hosts: backend
  become: yes
  
  vars:
    app_dir: /opt/open-invite
    jar_name: backend.jar
  
  tasks:
    - name: Install Java 17
      apt:
        name: openjdk-17-jdk
        state: present
        update_cache: yes
    
    - name: Install Maven
      apt:
        name: maven
        state: present
    
    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
    
    - name: Copy backend code
      synchronize:
        src: ../../../backend/
        dest: "{{ app_dir }}/source/"
        delete: yes
        rsync_opts:
          - "--exclude=target"
          - "--exclude=.git"
    
    - name: Fix ownership of source directory
      file:
        path: "{{ app_dir }}/source"
        owner: ubuntu
        group: ubuntu
        recurse: yes
    
    - name: Create application-production.properties
      copy:
        content: |
          server.port=8080
          spring.application.name=open-invite
          
          # Database Configuration
          spring.datasource.url=jdbc:postgresql://{{ database_host }}:{{ database_port }}/{{ database_name }}
          spring.datasource.username={{ database_user }}
          spring.datasource.password={{ database_password }}
          spring.datasource.driver-class-name=org.postgresql.Driver
          
          # JPA Configuration
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.show-sql=false
          spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
          
          # JWT Configuration
          jwt.secret=SuperSecureProductionKeyChangeThisToSomethingVeryLongAndRandomForProductionUse12345
          jwt.expiration=86400000
          
          # CORS Configuration
          cors.allowed-origins=http://{{ hostvars['frontend_server']['ansible_host'] }}
          
          # Logging
          logging.level.com.openinvite=INFO
        dest: "{{ app_dir }}/source/src/main/resources/application-production.properties"
        owner: ubuntu
        group: ubuntu
    
    - name: Build with Maven
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ app_dir }}/source"
      become_user: ubuntu
    
    - name: Copy JAR file
      copy:
        src: "{{ app_dir }}/source/target/backend-0.0.1-SNAPSHOT.jar"
        dest: "{{ app_dir }}/{{ jar_name }}"
        remote_src: yes
        owner: ubuntu
        group: ubuntu
        mode: '0755'
    
    - name: Create systemd service file
      copy:
        content: |
          [Unit]
          Description=Open Invite Backend Service
          After=network.target
          
          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory={{ app_dir }}
          ExecStart=/usr/bin/java -jar {{ app_dir }}/{{ jar_name }} --spring.profiles.active=production
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          
          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/open-invite.service
        mode: '0644'
    
    - name: Stop existing service (if running)
      systemd:
        name: open-invite
        state: stopped
      ignore_errors: yes
    
    - name: Start backend service
      systemd:
        name: open-invite
        state: started
        enabled: yes
        daemon_reload: yes
