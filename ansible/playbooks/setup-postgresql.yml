---
- name: Install and Configure PostgreSQL
  hosts: database
  become: yes
  
  vars:
    postgres_version: "14"
    db_name: "openinvite"
    db_user: "dbadmin"
    db_password: "OpenInvite2024!Secure"
  
  tasks:
    - name: Install PostgreSQL
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
        state: present
        update_cache: yes
    
    - name: Start PostgreSQL service
      systemd:
        name: postgresql
        state: started
        enabled: yes
    
    - name: Create database
      shell: sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};"
      args:
        creates: /var/lib/postgresql/db_created
      ignore_errors: yes
    
    - name: Create database user
      shell: sudo -u postgres psql -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';"
      ignore_errors: yes
    
    - name: Grant privileges
      shell: sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_user }};"
      ignore_errors: yes
    
    - name: Grant schema privileges
      shell: sudo -u postgres psql {{ db_name }} -c "GRANT ALL ON SCHEMA public TO {{ db_user }};"
      ignore_errors: yes
    
    - name: Configure PostgreSQL to listen on all interfaces
      lineinfile:
        path: /etc/postgresql/14/main/postgresql.conf
        regexp: '^#?listen_addresses'
        line: "listen_addresses = '*'"
      notify: restart postgresql
    
    - name: Configure pg_hba.conf for network access
      blockinfile:
        path: /etc/postgresql/14/main/pg_hba.conf
        block: |
          # Allow connections from VPC
          host    all             all             10.0.0.0/16             md5
      notify: restart postgresql
  
  handlers:
    - name: restart postgresql
      systemd:
        name: postgresql
        state: restarted
