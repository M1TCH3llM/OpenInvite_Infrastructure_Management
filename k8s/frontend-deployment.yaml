apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-invite-frontend
  namespace: frontend          # <-- lives in the frontend namespace
  labels:
    app: open-invite
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: open-invite
      component: frontend
  template:
    metadata:
      labels:
        app: open-invite
        component: frontend
    spec:
      containers:
        - name: frontend
          # REPLACE <AWS_ACCOUNT_ID> with your actual AWS account ID
          image: 094840069693.dkr.ecr.us-east-1.amazonaws.com/open-invite/frontend:latest
          ports:
            - containerPort: 80

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
# ============================================================
# Frontend Service
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: open-invite-frontend
  namespace: frontend
  labels:
    app: open-invite
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: open-invite
    component: frontend